<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Dashboard</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel = "stylesheet"> <script src="{{url_for('static',filename='init.js')}}"></script>
        <link rel = "stylesheet" href=""https://pyscript.net/release/2023.03.1/pyscript.css"/>
        <script defer src="https://pyscript.net/release/2023.03.1/pyscript.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    </head>

    <body class="bg-dark text-light">
        <div class = "container py-4">
            <h1> ESP32 Dashboard </h1>
            <div class="row g-4">
                <div class "col-md-6>
                    <div class="card bg-secondary">
                        <div class="card-body">
                            <h3>Sensor Data</h3>
                            <h4> Temp:
                                <span id = "temp">--</span>
                            </h4>
                            <h4> Humidity:
                                <span id = "humidity">--</span>
                            </h4>
                        </div>
                    </div>
                </div>
            <div class="col-md-6">
                <div class="card bg-secondary">
                    <div class="card-body">
                        <h3>LED</h3>
                        <button id = "onBtn" class="btn btn-success">ON</button>
                        <button id = "offBtn" class="btn btn-danger">OFF</button>
                    </div>
                </div>
            </div>
         </div>

         <div class="card bg-secondary mt-4">
            <div class="card-body">
                <canvas id="chart"></canvas>
            </div>
         </div>
         <py-script src="{{url_for('static',filename='script.py')}}"></py-script> 
    </body>

</html>
