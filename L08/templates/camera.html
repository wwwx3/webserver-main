<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Camera</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    </head>

    <body class = "bg-dark text-light">
            <div class="container mt-4">
                <h1 class="mb-3">Camera Feed</h1>
                <div class="row mb-3 align-items-center">
                    
                    <div class = "col-auto">
                        <button class = "btn btn-primary" onclick="prevCam()">Previous Camera</button>
                    </div>

                    <div class = "col-auto">
                        <input
                        id="camIndex"
                        type="number"
                        min="0"
                        class="form-control text-center"
                        value="{{ camIndex }}"
                        style="width: 80px"
                        oninput="validateInput(this)">
                    </div>

                    <div class = "col-auto">
                        <button class = "btn btn-primary" onclick="nextCam()">Next Camera</button>
                    </div>

                    <div class = "col-auto">
                        <button class = "btn btn-success" onclick="setCam()">Set Camera</button>
                    </div>

                        <div class = "card">
                            <div class = "card-body text-center">
                                <img src="{{ url_for('video_feed') }}" alt="Camera Feed" >
                                
                                <div class="mt-3">
                                    <button class = "btn btn-danger" onclick="captureImage()">Capture Image</button>
                                </div>

                                <div id="saveStatus" class = "mt-2">
                                </div>
                            </div>
                        </div>
                        
                        
                </div>
            </div>
        <script>
                function validateInput(el) {
                    if (el.value < 0) {
                        el.value = 0;
                    }
                    if (el.value === "") {
                        el.value = 0;
                    }
                }

                function setCam() {
                    let index = parseInt(document.getElementById('camIndex').value)
                        if (isNaN(index) || index < 0) {
                            index = 0;
                            document.getElementById('camIndex').value = 0;
                            alert("Please enter a valid camera index (0 or higher).");
                        return;
                        }
                    fetch("/set_camera", {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json"
                        },
                        body: JSON.stringify({ index:index })
                    })
                }

                function prevCam(){
                    let input = document.getElementById('camIndex')
                    let v = parseInt(input.value) || 0

                        if (v > 0) {
                            input.value = v - 1
                        }else{
                                input.value = 0
                        }

                }

                function nextCam(){
                    let input = document.getElementById('camIndex')
                    let v = parseInt(input.value) || 0
                    input.value = v + 1
                    setCam()
                }

                function captureImage() {
                    fetch("/capture", {
                    method: "POST"
                    })
                    .then(r => r.json())
                    .then(data => {
                        if (data.status === "saved") {
                            document.getElementById("saveStatus").innerHTML = "Saved: " + data.file
                        } else {
                            document.getElementById("saveStatus").innerHTML = "Error saving image"
                        }
                    });
                }
        
        </script>
    </body>

</html>
